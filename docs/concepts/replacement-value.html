  <span class="tag">保险核心概念</span>
  <h1>重置价值</h1>
  <div class="def">重置价值是指重新建造、购置或安装与被保险财产相同或类似的全新财产所需支付的费用，包含运费、安装费、关税等。</div>
  <h2>核心要点</h2>
  <ul>
    <li>重置价值是企财险最常用的保险价值确定方式</li>
    <li>按重置价值投保可获得足额保障，全损时按重置价值赔偿</li>
    <li>旧财产按原样修复即可的，不要求全新重置</li>
    <li>重置价值应包含合理的运输费、安装费、关税和增值税</li>
  </ul>
