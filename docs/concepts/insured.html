  <span class="tag">合同主体</span>
  <h1>被保险人</h1>
  <div class="def">被保险人是其财产或者人身受保险合同保障，享有保险金请求权的人。投保人可以是被保险人。</div>
  <h2>核心要点</h2>
  <ul>
    <li>被保险人是保险事故发生时享有赔偿请求权的主体</li>
    <li>被保险人负有出险通知义务和施救减损义务</li>
    <li>被保险人应维护保险标的安全，遵守安全生产法规</li>
    <li>被保险人转让保险标的应通知保险人</li>
  </ul>
