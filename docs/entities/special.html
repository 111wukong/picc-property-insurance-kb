<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>特别约定 — 实体索引 — PICC企财险知识库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #FAFBFC;
    color: #1A1A2E;
    line-height: 1.6;
    padding: 40px 24px;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    font-size: 24px;
    font-weight: 700;
    color: #EB2F96;
    margin-bottom: 8px;
  }
  .subtitle { color: #5A6178; font-size: 14px; margin-bottom: 24px; }
  .back-link { display: inline-block; margin-bottom: 20px; color: #1D39C4; font-size: 13px; text-decoration: none; }
  .back-link:hover { text-decoration: underline; }

  .search-box {
    width: 100%;
    padding: 10px 16px;
    border: 1px solid #E8ECF1;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: #EB2F96; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  th {
    background: #F0F2F5;
    padding: 10px 16px;
    text-align: left;
    font-size: 12px;
    font-weight: 600;
    color: #5A6178;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  td {
    padding: 10px 16px;
    border-top: 1px solid #F0F2F5;
    font-size: 13px;
  }
  .entity-name { font-weight: 600; }
  .entity-count { color: #5A6178; text-align: center; white-space: nowrap; }
  .entity-chapters { font-size: 12px; color: #8C8C8C; }
  .entity-chapters a { color: #1D39C4; text-decoration: none; }
  .entity-chapters a:hover { text-decoration: underline; }
  tr:hover { background: #FAFBFC; }

  .stats { font-size: 12px; color: #8C8C8C; margin-bottom: 16px; }

  @media (max-width: 768px) {
    body { padding: 20px 12px; }
    td { padding: 8px 10px; font-size: 12px; }
  }
</style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div class="container">
  <a href="../index.html" class="back-link">← 返回知识库首页</a>
  <h1>特别约定 <span style="font-size:16px;font-weight:400">(≡)</span></h1>
  <p class="subtitle">共 1 个实体，1 次出现</p>

  <input type="text" class="search-box" placeholder="🔍 搜索实体..." oninput="filterEntities(this.value)">

  <table id="entity-table">
    <thead>
      <tr>
        <th>实体名称</th>
        <th style="text-align:center">出现次数</th>
        <th>出现险种</th>
      </tr>
    </thead>
    <tbody>
      
        <tr id="entity-%E7%89%B9%E5%88%AB%E7%BA%A6%E5%AE%9A">
          <td class="entity-name" style="color:#EB2F96">特别约定</td>
          <td class="entity-count">1</td>
          <td class="entity-chapters"><a href="../chapters/%E8%B4%A2%E4%BA%A7%E5%9F%BA%E6%9C%AC%E9%99%A9%EF%BC%882025%E7%89%88%EF%BC%89.tagged.html">财产基本险（2025版）.tagged</a></td>
        </tr>
    </tbody>
  </table>
</div>

<script>
function filterEntities(query) {
  const rows = document.querySelectorAll('#entity-table tbody tr');
  const q = query.toLowerCase();
  rows.forEach(row => {
    const name = row.querySelector('.entity-name').textContent.toLowerCase();
    row.style.display = name.includes(q) ? '' : 'none';
  });
}
</script>
</body>
</html>
