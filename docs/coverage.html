<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>保险责任覆盖矩阵 — PICC企财险知识库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0F172A;
    color: #E2E8F0;
    padding: 80px 24px 40px;
  }
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 16px 24px;
    background: #0F172A;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1E293B;
  }
  .header h1 { font-size: 20px; font-weight: 700; color: #FAAD14; }
  .header nav { display: flex; gap: 12px; }
  .header nav a {
    color: #94A3B8; text-decoration: none; font-size: 13px;
    padding: 6px 14px; border: 1px solid #334155;
    border-radius: 6px; transition: all .2s;
  }
  .header nav a:hover, .header nav a.active { color: #FAAD14; border-color: #FAAD14; }
  .header nav a.active { background: rgba(250,173,20,.1); }
  .container { max-width: 1400px; margin: 0 auto; overflow-x: auto; }
  table { border-collapse: collapse; font-size: 11px; margin: 0 auto; }
  th { 
    padding: 6px 4px; color: #94A3B8; font-weight: 600; font-size: 10px;
    position: sticky; top: 60px; background: #0F172A; z-index: 10;
    writing-mode: vertical-rl; text-orientation: mixed;
    min-width: 20px; height: 140px; vertical-align: bottom;
    text-align: left;
  }
  th.corner { writing-mode: horizontal-tb; min-width: 160px; text-align: right; padding-right: 8px; }
  td {
    padding: 0; text-align: center; border: 1px solid #1E293B;
    width: 20px; height: 20px; transition: all .2s;
  }
  td.covered { background: #FAAD14; }
  td.not-covered { background: #1E293B; }
  td:hover { transform: scale(1.3); z-index: 5; position: relative; }
  .row-label { 
    text-align: right; padding-right: 8px; color: #94A3B8; font-size: 10px;
    white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
  }
  .stats { text-align: center; margin-bottom: 24px; color: #64748B; font-size: 13px; }
  .stats span { margin: 0 12px; }
  .legend { display: flex; gap: 20px; justify-content: center; margin-top: 24px; font-size: 12px; color: #64748B; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-sq { width: 14px; height: 14px; border-radius: 2px; }
  .tooltip-matrix {
    position: fixed;
    background: #1E293B;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 8px 12px;
    pointer-events: none;
    font-size: 12px;
    z-index: 200;
    opacity: 0;
    transition: opacity .15s;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="header">
  <h1>📊 保险责任覆盖矩阵</h1>
  <nav>
    <a href="kg.html">关系网络</a>
    <a href="coverage.html" class="active">责任覆盖矩阵</a>
    <a href="../index.html">← 返回首页</a>
  </nav>
</div>

<div class="container">
  <div class="stats" id="stats"></div>
  <div style="overflow-x:auto;">
    <table id="matrix"></table>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-sq" style="background:#FAAD14"></div> 承保</div>
    <div class="legend-item"><div class="legend-sq" style="background:#1E293B;border:1px solid #334155"></div> 不保</div>
    <div class="legend-item"><span>💡 悬停方块查看详情</span></div>
  </div>
</div>
<div class="tooltip-matrix" id="tooltip"></div>

<script>
fetch('kg/coverage_matrix.json')
  .then(r => r.json())
  .then(data => {
    const tooltip = document.getElementById('tooltip');
    
    // Stats
    const totalCells = data.products.length * data.perils.length;
    const covered = data.matrix.flat().reduce((a,b) => a+b, 0);
    document.getElementById('stats').innerHTML = `
      <span>险种: <b style="color:#FAAD14">${data.products.length}</b></span>
      <span>关键风险: <b style="color:#FAAD14">${data.perils.length}</b></span>
      <span>覆盖率: <b style="color:#FAAD14">${(covered/totalCells*100).toFixed(1)}%</b></span>
    `;

    // Build table
    const table = document.getElementById('matrix');
    let html = '<thead><tr><th class="corner">险种 \\ 风险</th>';
    
    data.perils.forEach(p => {
      html += `<th title="${p}">${p}</th>`;
    });
    html += '</tr></thead><tbody>';

    data.products.forEach((product, i) => {
      html += '<tr>';
      html += `<td class="row-label" title="${product}">${product}</td>`;
      data.matrix[i].forEach((cell, j) => {
        const cls = cell ? 'covered' : 'not-covered';
        html += `<td class="${cls}" 
          data-product="${product.replace(/"/g,'&quot;')}" 
          data-peril="${data.perils[j]}" 
          data-covered="${cell}"></td>`;
      });
      html += '</tr>';
    });

    html += '</tbody>';
    table.innerHTML = html;

    // Tooltip
    table.querySelectorAll('td.covered, td.not-covered').forEach(td => {
      td.addEventListener('mouseover', function() {
        const product = this.dataset.product;
        const peril = this.dataset.peril;
        const covered = this.dataset.covered === '1';
        tooltip.style.opacity = '1';
        tooltip.innerHTML = `
          <div style="color:#FAAD14;font-weight:600">${product}</div>
          <div style="color:${covered?'#22C55E':'#EF4444'}">${covered?'✅ 承保':'❌ 不保'} — ${peril}</div>
        `;
      });
      td.addEventListener('mousemove', function(e) {
        tooltip.style.left = (e.pageX + 15) + 'px';
        tooltip.style.top = (e.pageY - 15) + 'px';
      });
      td.addEventListener('mouseout', function() {
        tooltip.style.opacity = '0';
      });
    });
  });
</script>
</body>
</html>
