<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>险种关系图谱 — PICC企财险知识库</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #FAFBFC;
    color: #1A1A2E;
    overflow: hidden;
    height: 100vh;
  }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,255,255,.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid #E8ECF1;
  }
  .header h1 { font-size: 18px; font-weight: 700; color: #D4380D; }
  .header nav { display: flex; gap: 8px; }
  .header nav a {
    color: #5A6178; text-decoration: none; font-size: 12px;
    padding: 5px 12px; border: 1px solid #E8ECF1;
    border-radius: 6px; transition: all .2s; font-weight: 500;
  }
  .header nav a:hover, .header nav a.active { color: #D4380D; border-color: #D4380D; }
  .header nav a.active { background: #FFF2F0; }
  #graph-container { width: 100%; height: 100vh; }
  .node circle { stroke: white; stroke-width: 2; cursor: pointer; transition: r .3s; }
  .node text { font-size: 10px; fill: #5A6178; pointer-events: none; font-weight: 500; }
  .node:hover circle { stroke: #D4380D; stroke-width: 3; }
  .node:hover text { fill: #D4380D; font-weight: 700; }
  .link { stroke: #D1D9E6; stroke-opacity: .7; }
  .link.extends { stroke: #3B82F6; stroke-opacity: .5; stroke-dasharray: 5,3; }
  .link.companion { stroke: #22C55E; stroke-opacity: .5; stroke-dasharray: 3,3; }
  .link.depends_on { stroke: #F97316; stroke-opacity: .4; }
  .tooltip {
    position: fixed; background: white; border: 1px solid #E8ECF1;
    border-radius: 8px; padding: 12px 16px; pointer-events: none;
    font-size: 12px; max-width: 280px; z-index: 200; opacity: 0;
    transition: opacity .15s; box-shadow: 0 4px 16px rgba(0,0,0,.08);
  }
  .tooltip .name { font-weight: 700; color: #D4380D; font-size: 14px; margin-bottom: 4px; }
  .tooltip .meta { color: #5A6178; }
  .legend {
    position: fixed; bottom: 24px; left: 24px;
    display: flex; gap: 16px; font-size: 11px; color: #8C8C8C;
    background: rgba(255,255,255,.85); padding: 8px 14px;
    border-radius: 8px; border: 1px solid #E8ECF1; backdrop-filter: blur(4px);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 20px; height: 2px; }
</style>
</head>
<body>
<div class="header">
  <h1>🕸️ 险种关系图谱</h1>
  <nav>
    <a href="kg.html" class="active">关系网络</a>
    <a href="coverage.html">覆盖矩阵</a>
    <a href="index.html">← 返回首页</a>
  </nav>
</div>
<div id="graph-container"></div>
<div class="tooltip" id="tooltip"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-line" style="background:#3B82F6;border:dashed 1px #3B82F6"></div> 特化/扩展</div>
  <div class="legend-item"><div class="legend-line" style="background:#22C55E"></div> 搭配主险</div>
  <div class="legend-item"><div class="legend-line" style="background:#F97316"></div> 依附关系</div>
</div>
<script>
const colors = {1:'#D4380D',2:'#1D39C4',3:'#531DAB',4:'#237804',5:'#8C8C8C'};
const catNames = {1:'财产险主险',2:'利润损失险',3:'特殊财产险',4:'行业定制险',5:'其他'};
fetch('kg/product_graph.json').then(r=>r.json()).then(data=>{
  const W=window.innerWidth,H=window.innerHeight;
  const svg=d3.select('#graph-container').append('svg').attr('width',W).attr('height',H);
  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([.3,3]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom).call(zoom.transform,d3.zoomIdentity.translate(W/2,H/2));
  const tip=d3.select('#tooltip');
  const sim=d3.forceSimulation(data.nodes)
    .force('link',d3.forceLink(data.links).id(d=>d.id).distance(120))
    .force('charge',d3.forceManyBody().strength(-300))
    .force('center',d3.forceCenter(0,0))
    .force('collide',d3.forceCollide(40));
  const link=g.append('g').selectAll('line').data(data.links).join('line')
    .attr('class',d=>`link ${d.type}`).attr('stroke-width',d=>d.type==='extends'?1.5:1);
  const node=g.append('g').selectAll('g').data(data.nodes).join('g').attr('class','node')
    .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));
  node.append('circle').attr('r',d=>Math.max(8,Math.sqrt(d.chars)/10)).attr('fill',d=>colors[d.groupId]);
  node.append('text').attr('dy',d=>-Math.max(8,Math.sqrt(d.chars)/10)-3).attr('text-anchor','middle').text(d=>d.name);
  node.on('mouseover',function(e,d){tip.style('opacity',1).html(`<div class="name" style="color:${colors[d.groupId]}">${d.fullName}</div><div class="meta">${catNames[d.groupId]} · ${d.chars.toLocaleString()}字符 · ${d.articles}条</div>`)})
    .on('mousemove',function(e){tip.style('left',(e.pageX+15)+'px').style('top',(e.pageY-15)+'px')})
    .on('mouseout',function(){tip.style('opacity',0)})
    .on('click',function(e,d){window.open(`chapters/${d.id.replace('p','')}_${encodeURIComponent(d.fullName.replace('/','_'))}.html`,'_blank')});
  sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`)});
});
</script>
</body>
</html>
